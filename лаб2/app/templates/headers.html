{% extends 'base.html' %}

{% block content %}
<h1 class="my-4">Заголовки HTTP-запроса</h1>

<div class="row">
    <div class="col-md-10 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="h5 mb-0">Заголовки (Headers)</h3>
            </div>
            <div class="card-body">
                <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Название заголовка</th>
                                <th>Значение</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for key, value in headers.items() %}
                                <tr>
                                    <td>{{ loop.index }}</td>
                                    <td><code><strong>{{ key }}</strong></code></td>
                                    <td><code class="text-break">{{ value }}</code></td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
